image: docker:24.0.5

services:
  - docker:24.0.5-dind

variables:
  ECR_REGISTRY: "147885311931.dkr.ecr.eu-central-1.amazonaws.com"
  APP_NAME: "sdu-chat-bot/backend"
  IMAGE_TAG: $CI_COMMIT_SHA
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - deploy

build_and_push:
  stage: build
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker build -t $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG .
    
    - docker tag $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG $ECR_REGISTRY/$APP_NAME:latest
    
    - docker push $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG
    - docker push $ECR_REGISTRY/$APP_NAME:latest
  
  only:
    - main